    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FeelShare — Create Account</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    </head>
    <body>
    <div class="auth-page">
        <div class="auth-blob blob-1"></div>
        <div class="auth-blob blob-2"></div>

        <div class="auth-card">
        <div class="auth-header">
            <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-heart-pulse"></i></div>
            FeelShare
            </div>
            <h1>Create Account</h1>
            <p>Share your feelings with the people you trust.</p>
        </div>

        <form id="signupForm" novalidate>
            <!-- Name Row -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <div class="input-icon-wrap">
                <i class="fa-solid fa-user icon"></i>
                <input type="text" id="firstName" class="form-control" placeholder="Juan" required />
                </div>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <div class="input-icon-wrap">
                <i class="fa-solid fa-user icon"></i>
                <input type="text" id="lastName" class="form-control" placeholder="Dela Cruz" required />
                </div>
            </div>
            </div>

            <div class="form-group">
            <label for="username">Username</label>
            <div class="input-icon-wrap">
                <i class="fa-solid fa-at icon"></i>
                <input type="text" id="username" class="form-control" placeholder="juandelacruz" required />
            </div>
            <div class="text-sm text-muted mt-1" id="usernameHint">This will be your public profile name.</div>
            </div>

            <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-icon-wrap">
                <i class="fa-solid fa-envelope icon"></i>
                <input type="email" id="email" class="form-control" placeholder="juan@email.com" required />
            </div>
            </div>

            <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon-wrap">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required />
                <button type="button" class="toggle-pw" onclick="togglePw('password','eyePw')">
                <i class="fa-solid fa-eye" id="eyePw"></i>
                </button>
            </div>
            </div>

            <!-- PIN Setup -->
            <div class="form-group">
            <label>Create PIN <span class="text-muted" style="font-weight:400;text-transform:none;">(4 digits — para sa pag-send ng feelings)</span></label>
            <div class="pin-inputs" id="pinInputsCreate">
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin-index="0" />
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin-index="1" />
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin-index="2" />
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin-index="3" />
            </div>
            </div>

            <div class="form-group">
            <label>Confirm PIN</label>
            <div class="pin-inputs" id="pinInputsConfirm">
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin-confirm-index="0" />
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin-confirm-index="1" />
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin-confirm-index="2" />
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin-confirm-index="3" />
            </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
            <span id="signupBtnText">Create Account</span>
            <span id="signupSpinner" class="spinner d-none"></span>
            </button>
        </form>

        <div class="divider">or</div>

        <button class="btn btn-google btn-full" id="googleSignupBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
            Continue with Google
        </button>

        <div class="text-center mt-3 text-sm">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="auth.js"></script>
    <script>
        function togglePw(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye','fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash','fa-eye');
        }
        }

        // PIN input auto-advance
        function setupPinInputs(selector, attr) {
        const inputs = document.querySelectorAll(`[${attr}]`);
        inputs.forEach((input, i) => {
            input.addEventListener('input', () => {
            input.value = input.value.replace(/[^0-9]/g,'');
            if (input.value && i < inputs.length - 1) inputs[i+1].focus();
            input.classList.toggle('filled', !!input.value);
            });
            input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && i > 0) inputs[i-1].focus();
            });
        });
        }
        setupPinInputs('#pinInputsCreate', 'data-pin-index');
        setupPinInputs('#pinInputsConfirm', 'data-pin-confirm-index');
    </script>
    </body>
    </html>
